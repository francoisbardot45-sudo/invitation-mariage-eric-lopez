services:
  - type: web
    name: invitation-eric-lopez
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PATH
        value: gestion-eric-lopez-2026
      - key: ADMIN_SECRET
        generateValue: true
